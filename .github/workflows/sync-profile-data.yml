name: Sync profile data

on:
  workflow_dispatch:
  schedule:
    - cron: "17 5 * * *"

permissions:
  contents: write

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Check out the site
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh publications
        run: python scripts/sync_publications.py

      - name: Refresh optional Google Scholar metrics
        continue-on-error: true
        env:
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/sync_scholar_metrics.py

      - name: Refresh optional LinkedIn activity
        continue-on-error: true
        env:
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_PERSON_URN: ${{ secrets.LINKEDIN_PERSON_URN }}
          LINKEDIN_FEED_URL: ${{ secrets.LINKEDIN_FEED_URL }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
        run: python scripts/sync_linkedin.py

      - name: Commit changed data
        run: |
          if git diff --quiet -- data; then
            echo "Profile data is already current."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data
          git commit -m "chore: refresh profile data"
          git push
